<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 200" class="w-full h-full">
  <defs>
    <linearGradient id="coffinSkin" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F3E5D8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8D5C4;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Nail bed -->
  <path d="M30 80 C 30 80, 25 60, 35 40 C 42 25, 55 20, 65 40 C 72 60, 68 80, 68 80" 
        fill="#FFDFC4" stroke="#E08862" stroke-width="1"/>
  <!-- Coffin nail - squared flat top with tapered sides -->
  <path d="M35 80 L 33 100 L 32 145 L 35 170 L 45 171 L 55 171 L 65 170 L 68 145 L 67 100 L 65 80" 
        fill="#E8D5C4" stroke="#C4A484" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Flat top line -->
  <line x1="32" y1="145" x2="68" y2="145" stroke="#C4A484" stroke-width="1.5" opacity="0.5"/>
  <!-- Highlight -->
  <path d="M38 90 L 37 105" 
        stroke="white" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.6"/>
</svg>